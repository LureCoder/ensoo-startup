<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#ffffff"/>
  <g fill="#000000">
    <!-- QR code pattern -->
    <rect x="30" y="30" width="40" height="40"/>
    <rect x="130" y="30" width="40" height="40"/>
    <rect x="30" y="130" width="40" height="40"/>
    <rect x="130" y="130" width="40" height="40"/>
    <rect x="80" y="80" width="40" height="40"/>
    <rect x="60" y="60" width="20" height="20"/>
    <rect x="120" y="60" width="20" height="20"/>
    <rect x="60" y="120" width="20" height="20"/>
    <rect x="120" y="120" width="20" height="20"/>
  </g>
  <text x="100" y="180" font-family="Arial" font-size="12" text-anchor="middle" fill="#000000">Scan QR Code</text>
</svg>