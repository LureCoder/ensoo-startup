name: CI/CD for Enso Startup

on:
  push:
    branches:
      - main # 只有当 main 分支有代码推送时才触发
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 构建项目
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "构建版本: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          npm install
          npm run build

      - name: 登录到 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            lurecoder/ensoo-startup:latest
            lurecoder/ensoo-startup:v${{ env.VERSION }}

      - name: 部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          envs: VERSION
          script: |
            set -e
            
            BUILD_VERSION="${{ env.VERSION }}"
            
            echo "========== 开始部署 =========="
            echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "构建版本: $BUILD_VERSION"
            
            echo "========== 检查 Docker 权限 =========="
            if ! docker ps > /dev/null 2>&1; then
              echo "错误: Docker 权限不足"
              echo "请确保用户 '$(whoami)' 在 docker 组中，或使用 sudo"
              echo "解决方案："
              echo "1. 将用户添加到 docker 组: sudo usermod -aG docker $(whoami)"
              echo "2. 或者使用 sudo 运行 docker 命令"
              exit 1
            fi
            echo "Docker 权限检查通过"
            
            echo "========== 清理旧容器 =========="
            docker stop ensoo-startup 2>/dev/null || echo "容器未运行"
            docker rm ensoo-startup 2>/dev/null || echo "容器不存在"
            
            echo "========== 拉取最新镜像 =========="
            docker pull lurecoder/ensoo-startup:v$BUILD_VERSION
            
            echo "========== 启动新容器 =========="
            docker run -d \
              --name ensoo-startup \
              --restart=always \
              -p 80:80 -p 443:443 \
              -v /home/githubdeployer/certs:/etc/certs:ro \
              lurecoder/ensoo-startup:v$BUILD_VERSION || {
              echo "错误: 容器启动失败"
              exit 1
            }
            echo "容器已启动"
            
            echo "========== 验证容器状态 =========="
            sleep 5
            
            INSPECT_STATUS=$(docker inspect --format='{{.State.Status}}' ensoo-startup 2>/dev/null)
            PS_STATUS=$(docker ps -a --filter name=ensoo-startup --format '{{.Status}}' 2>/dev/null)
            
            echo "Docker inspect 状态: $INSPECT_STATUS"
            echo "Docker ps 状态: $PS_STATUS"
            
            if [ "$INSPECT_STATUS" == "running" ] || echo "$PS_STATUS" | grep -q "^Up"; then
              echo "✓ 容器启动成功！"
            else
              echo "✗ 错误: 容器未正常运行"
              echo "容器日志:"
            docker logs ensoo-startup
            exit 1
            fi
            
            echo "========== 清理过期镜像 =========="
            docker image prune -f
            
            echo "========== 系统信息 =========="
            echo "系统: $(cat /etc/os-release | grep PRETTY_NAME | cut -d'=' -f2 | tr -d '"')"
            echo "Docker 版本: $(docker --version)"
            echo "容器状态:"
            docker ps -a | grep ensoo-startup
            
            echo "========== 部署成功 =========="
            echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
